<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>JIT Tracking Dashboard</title>
    <style>
        :root {
            --bg-color: #121212;
            --surface-color: #1e1e1e;
            --text-primary: #e0e0e0;
            --text-secondary: #aaaaaa;
            --border-color: #333333;
            --accent-yellow: #fdd835;
            --accent-green: #43a047;
            --accent-blue: #1e88e5;
            --accent-red: #e53935;
        }
        body { font-family: 'Segoe UI', sans-serif; background-color: var(--bg-color); color: var(--text-primary); margin: 0; padding: 20px; }
        .dashboard-container { max-width: 1200px; margin: 0 auto; }
        .header-panel { display: flex; gap: 20px; margin-bottom: 20px; }
        .card { background-color: var(--surface-color); border: 1px solid var(--border-color); border-radius: 8px; padding: 20px; flex: 1; }
        table { width: 100%; border-collapse: collapse; background-color: var(--surface-color); border-radius: 8px; }
        th, td { padding: 12px 15px; text-align: left; border-bottom: 1px solid var(--border-color); }
        th { background-color: #2c2c2c; }
        tr:nth-child(even) { background-color: #1a1a1a; }
        .shuttle-header td { font-weight: bold; background-color: #252525; }
        .nested { padding-left: 20px; color: var(--text-secondary); }
        .badge { display: inline-block; padding: 4px 8px; border-radius: 4px; font-size: 0.85em; font-weight: 600; margin: 2px; }
        .badge-clear { background-color: rgba(67, 160, 71, 0.2); color: #81c784; border: 1px solid #43a047; }
        .badge-restriction { background-color: rgba(229, 57, 53, 0.2); color: #e57373; border: 1px solid #e53935; }
    </style>
</head>
<body>
    <div class="dashboard-container">
        <h1>JIT Tracking Dashboard</h1>
        <div class="header-panel">
            <div class="card">
                <h3>🏆 Top Routes by Desk</h3>
                <ul>
                    <li>🟡 <strong>Dry:</strong> 2327</li>
                    <li>🟢 <strong>Chill:</strong> 2324</li>
                    <li>🔵 <strong>Freezer:</strong> 2053</li>
                </ul>
            </div>
        </div>
        <table>
            <thead><tr><th>Shuttle / Group</th><th>Route</th><th>Time</th><th>Driver</th><th>Status</th><th>Active Restrictions</th></tr></thead>
            <tbody>
                <!-- Condensed for brevity; insert full table logic here -->
                <tr class="shuttle-header"><td><strong>LOCAL</strong></td><td>-</td><td>-</td><td>-</td><td><span class="badge badge-clear">🟢 CLEAR</span></td><td></td></tr>
                <tr><td class="nested">↳</td><td>2319</td><td>0:00</td><td>COOK</td><td></td><td><span class="badge badge-restriction">🛑 53-JIT</span> <span class="badge badge-restriction">🛑 86-600</span></td></tr>
                <!-- Table body matches current state -->
            </tbody>
        </table>
    </div>
</body>
</html>
